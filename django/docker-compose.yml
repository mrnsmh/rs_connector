# Stack Django INDEPENDANTE (projet rsconnector-django) : Postgres dedie + web Django.
# Port hote dedie 127.0.0.1:3019 (n'entre pas en conflit avec le Node live sur 3018).
name: rsconnector-django

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 150m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    mem_limit: 400m
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3019:8000"

volumes:
  pgdata:
